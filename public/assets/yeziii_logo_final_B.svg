  <line x1="-7" y1="-37" x2="-7" y2="0" stroke="#1A1613" stroke-width="0.7" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(26, 22, 19);color:rgb(0, 0, 0);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>
